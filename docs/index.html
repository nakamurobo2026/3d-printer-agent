<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>3D Printer Agent Dashboard</title><style>body{font-family:Arial,sans-serif;margin:0;background:#f5f7f8;color:#17202a}header{background:#0f766e;color:white;padding:20px 24px}main{padding:20px 24px;max-width:1200px;margin:auto}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card,table{background:white;border:1px solid #d9e0e6;border-radius:8px}.card{padding:14px}.card h2{font-size:12px;color:#60707f;margin:0 0 8px}.card p{font-size:24px;font-weight:700;margin:0}table{width:100%;border-collapse:collapse;margin-top:16px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid #d9e0e6;text-align:left;font-size:13px}th{background:#edf2f4}.risk-low{color:#15803d}.risk-mid{color:#b45309}.risk-high{color:#b91c1c}@media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body><header><h1>3D Printer Agent Dashboard</h1><p>GitHub Pages閲覧専用ダッシュボード</p></header><main><p id="notice">Loading...</p><section class="grid"><div class="card"><h2>商品候補</h2><p id="candidates">0</p></div><div class="card"><h2>承認済み</h2><p id="approved">0</p></div><div class="card"><h2>平均Final Score</h2><p id="score">0</p></div><div class="card"><h2>平均Precision Risk</h2><p id="risk">0</p></div></section><table><thead><tr><th>市場</th><th>Pain</th><th>Market</th><th>Risk</th><th>Final</th><th>Status</th></tr></thead><tbody id="rows"></tbody></table></main><script>let S={opportunities:[],products:[]};async function j(p,f){try{let r=await fetch(p,{cache:'no-store'});return r.ok?await r.json():f}catch{return f}}function prod(o){return S.products.find(p=>p.market_id===o.id)||{}}function fs(o){let r=Number(o.precision_risk_score||0);return Math.max(0,Math.round(Number(o.pain_score||0)*.4+Number(o.margin_score||0)*.2+Number(o.repeatability_score||0)*.2+Number(o.search_volume_score||0)*.2-r*1.5))||Number(o.opportunity_score||0)}function rc(r){return r>=50?'risk-high':r>=25?'risk-mid':'risk-low'}async function load(){S.opportunities=await j('data/opportunities.json',[]);S.products=await j('data/product_ideas.json',[]);let rows=S.opportunities;document.getElementById('rows').innerHTML=rows.map(o=>{let p=prod(o),r=Number(o.precision_risk_score||0);return `<tr><td>${o.market_name}</td><td>${o.pain_category||''}</td><td>${o.opportunity_score||0}</td><td class="${rc(r)}">${r}</td><td>${fs(o)}</td><td>${p.status||'discovered'}</td></tr>`}).join('');document.getElementById('candidates').textContent=rows.length;document.getElementById('approved').textContent=S.products.filter(p=>p.status==='approved').length;document.getElementById('score').textContent=rows.length?Math.round(rows.reduce((a,o)=>a+fs(o),0)/rows.length):0;document.getElementById('risk').textContent=rows.length?Math.round(rows.reduce((a,o)=>a+Number(o.precision_risk_score||0),0)/rows.length):0;document.getElementById('notice').textContent='Loaded docs/data/*.json'}load();</script></body></html>
