<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Printer Agent Dashboard</title>
  <style>
    :root{--bg:#f5f7f8;--panel:#fff;--ink:#17202a;--muted:#60707f;--line:#d9e0e6;--brand:#0f766e;--good:#15803d;--warn:#b45309;--bad:#b91c1c}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--ink)}header{background:var(--brand);color:#fff;padding:18px 24px;display:flex;justify-content:space-between;gap:16px;align-items:center}header h1{margin:0;font-size:22px}header p{margin:6px 0 0;color:#d7fffa}main{padding:20px 24px;max-width:1480px;margin:0 auto}.toolbar{display:grid;grid-template-columns:1fr 180px 220px;gap:12px;align-items:end;margin-bottom:16px}label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}input,select{width:100%;padding:10px;border:1px solid var(--line);border-radius:6px;background:white}.metrics{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:16px}.metric,.panel,article{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}.metric h2{font-size:12px;color:var(--muted);margin:0 0 8px}.metric p{font-size:24px;margin:0;font-weight:700}table{width:100%;border-collapse:collapse;background:white;border:1px solid var(--line);border-radius:8px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:13px}th{background:#edf2f4;font-size:12px;color:#334155}button{border:1px solid var(--line);background:white;border-radius:6px;padding:7px 9px;cursor:pointer}.score{font-weight:700}.risk-low{color:var(--good)}.risk-mid{color:var(--warn)}.risk-high{color:var(--bad)}.status{display:inline-block;padding:4px 8px;border-radius:999px;background:#e2e8f0;font-size:12px}.status.approved,.status.production_ready,.status.selling{background:#dcfce7;color:#166534}.status.paused{background:#fef3c7;color:#92400e}.status.archived{background:#fee2e2;color:#991b1b}.notice{margin:0 0 12px;color:var(--muted)}.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:24px}.modal{width:min(940px,100%);max-height:86vh;overflow:auto;background:white;border-radius:8px;border:1px solid var(--line)}.modal header{background:white;color:var(--ink);border-bottom:1px solid var(--line)}.modal header h2{margin:0;font-size:18px}.modal-body{padding:18px;display:grid;gap:12px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:6px;overflow:auto;white-space:pre-wrap}@media(max-width:980px){header{display:block}.toolbar,.metrics,.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header><div><h1>3D Printer Agent Dashboard</h1><p>GitHub Pages公開用の閲覧専用ダッシュボード。承認、CSVアップロード、Daily Pipelineはローカル版で実行します。</p></div><button id="refresh">再読み込み</button></header>
  <main><p id="notice" class="notice">Loading...</p><section class="toolbar"><div><label for="search">検索</label><input id="search" placeholder="商品名、Pain Category、カテゴリで検索"></div><div><label for="statusFilter">ステータス</label><select id="statusFilter"><option value="">すべて</option></select></div><div><label for="riskFilter">Precision Risk</label><select id="riskFilter"><option value="">すべて</option><option value="low">low: 0-24</option><option value="mid">mid: 25-49</option><option value="high">high: 50+</option></select></div></section><section class="metrics"><div class="metric"><h2>商品候補</h2><p id="metricCandidates">0</p></div><div class="metric"><h2>承認済み</h2><p id="metricApproved">0</p></div><div class="metric"><h2>平均Final Score</h2><p id="metricAvgScore">0</p></div><div class="metric"><h2>平均Precision Risk</h2><p id="metricAvgRisk">0</p></div><div class="metric"><h2>Listings</h2><p id="metricListings">0</p></div></section><section class="panel"><table><thead><tr><th>商品候補</th><th>Pain Category</th><th>Market Score</th><th>Precision Risk</th><th>Final Score</th><th>Status</th><th>Next Action</th><th>詳細</th></tr></thead><tbody id="candidateRows"></tbody></table></section></main>
  <div id="modalBackdrop" class="modal-backdrop"><div class="modal"><header><h2 id="modalTitle">商品詳細</h2><button id="modalClose">閉じる</button></header><div id="modalBody" class="modal-body"></div></div></div>
  <script>
    let state={snapshot:{},opportunities:[],products:[],listings:[]};const statuses=['discovered','watching','validated','approved','designing','prototype_ready','prototype_testing','revision_required','production_ready','selling','paused','archived'];function esc(v){return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]))}async function loadJson(p,f){try{const r=await fetch(p,{cache:'no-store'});return r.ok?await r.json():f}catch{return f}}function productFor(o){return state.products.find(p=>p.market_id===o.id||p.id===o.id)||{}}function listingFor(p){return state.listings.find(l=>l.product_id===p.id)||{}}function strategyFor(p){return(((state.snapshot||{}).strategies||{})[p.id])||{}}function statusFor(o){return productFor(o).status||'discovered'}function finalScore(o){const r=Number(o.precision_risk_score||0);return Math.max(0,Math.round((Number(o.pain_score||0)*.4)+(Number(o.margin_score||0)*.2)+(Number(o.repeatability_score||0)*.2)+(Number(o.search_volume_score||0)*.2)-(r*1.5)))||Number(o.opportunity_score||0)}function riskClass(r){return r>=50?'risk-high':r>=25?'risk-mid':'risk-low'}function riskBucket(r){return r>=50?'high':r>=25?'mid':'low'}function notice(t){document.getElementById('notice').textContent=t}async function loadData(){notice('Loading GitHub Pages data...');const[s,o,p,l]=await Promise.all([loadJson('data/latest_snapshot.json',{}),loadJson('data/opportunities.json',[]),loadJson('data/product_ideas.json',[]),loadJson('data/listing_drafts.json',[])]);state={snapshot:s,opportunities:o,products:p,listings:l};renderStatusOptions();render();notice(`Loaded ${o.length} opportunities.`)}function renderStatusOptions(){const s=document.getElementById('statusFilter');if(s.options.length>1)return;statuses.forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;s.appendChild(o)})}function filtered(){const q=document.getElementById('search').value.trim().toLowerCase(),st=document.getElementById('statusFilter').value,risk=document.getElementById('riskFilter').value;return state.opportunities.filter(o=>{const p=productFor(o);const text=[o.market_name,o.category,o.pain_category,p.name].join(' ').toLowerCase();if(q&&!text.includes(q))return false;if(st&&statusFor(o)!==st)return false;if(risk&&riskBucket(Number(o.precision_risk_score||0))!==risk)return false;return true})}function render(){const rows=filtered();document.getElementById('candidateRows').innerHTML=rows.map(o=>{const p=productFor(o),st=statusFor(o),r=Number(o.precision_risk_score||0);return `<tr><td>${esc(o.market_name)}<br><small>${esc(o.category||'')}</small></td><td>${esc(o.pain_category||'')}</td><td class="score">${o.opportunity_score||0}</td><td class="${riskClass(r)} score">${r}</td><td class="score">${finalScore(o)}</td><td><span class="status ${st}">${st}</span></td><td>${esc(p.next_action||'商品候補レビュー')}</td><td><button onclick="openDetail('${o.id}')">表示</button></td></tr>`}).join('');const avg=rows.length?Math.round(rows.reduce((s,o)=>s+finalScore(o),0)/rows.length):0,ar=rows.length?Math.round(rows.reduce((s,o)=>s+Number(o.precision_risk_score||0),0)/rows.length):0;document.getElementById('metricCandidates').textContent=rows.length;document.getElementById('metricApproved').textContent=state.products.filter(p=>p.status==='approved').length;document.getElementById('metricAvgScore').textContent=avg;document.getElementById('metricAvgRisk').textContent=ar;document.getElementById('metricListings').textContent=state.listings.length}function panel(t,p){if(!p||(Array.isArray(p)&&!p.length))return `<article><b>${t}</b><p>未生成</p></article>`;return `<article><b>${t}</b><pre>${esc(typeof p==='string'?p:JSON.stringify(p,null,2))}</pre></article>`}function openDetail(id){const o=state.opportunities.find(x=>x.id===id),p=productFor(o),l=listingFor(p),s=strategyFor(p),m=s.marketing_strategy||{};document.getElementById('modalTitle').textContent=o.market_name||'商品詳細';document.getElementById('modalBody').innerHTML=`<div class="grid"><article><b>顧客の悩み</b><p>${esc(o.customer_pain||'')}</p></article><article><b>次アクション</b><p>${esc(p.next_action||'商品候補レビュー')}</p></article><article><b>スコア</b><p>Market: ${o.opportunity_score||0} / Risk: ${o.precision_risk_score||0} / Final: ${finalScore(o)}</p></article><article><b>ステータス</b><p>${esc(statusFor(o))}</p></article>${panel('市場分析',s.market_analysis)}${panel('競合分析',s.competitive_analysis)}${panel('マーケティング戦略',m)}${panel('SEOキーワード',m.seo_keywords)}${panel('商品ページ構成',m.product_page_structure)}${panel('動画台本',m.short_video_scripts)}${panel('SNS投稿案',m.sns_post_templates)}${panel('FAQ',m.faq)}</div><article><b>販売ページ下書き</b><pre>${esc(l.body||'未生成')}</pre></article>`;document.getElementById('modalBackdrop').style.display='flex'}document.getElementById('search').addEventListener('input',render);document.getElementById('statusFilter').addEventListener('change',render);document.getElementById('riskFilter').addEventListener('change',render);document.getElementById('refresh').addEventListener('click',loadData);document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modalBackdrop').style.display='none');document.getElementById('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')e.currentTarget.style.display='none'});loadData().catch(e=>notice(`Error: ${e.message}`));
  </script>
</body>
</html>
