name: Daily Agent

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  daily-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run review mining pipeline
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          YAHOO_APP_ID: ${{ secrets.YAHOO_APP_ID }}
        run: python -m src.main daily

      - name: Build GitHub Pages dashboard
        run: python scripts/build_pages.py

      - name: Commit generated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/*.csv data/raw/*.json data/processed/*.json docs/index.html docs/.nojekyll docs/data/*.json
          git diff --cached --quiet || git commit -m "Update daily market research dashboard [skip ci]"
          git push
