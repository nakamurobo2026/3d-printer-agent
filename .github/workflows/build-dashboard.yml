name: Build Dashboard Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard data
        run: python -m src.main daily

      - name: Build docs for GitHub Pages
        run: python scripts/build_pages.py

      - name: Ensure Pages marker
        run: touch docs/.nojekyll

      - name: Commit docs and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json docs/index.html docs/.nojekyll docs/data/*.json
          git diff --cached --quiet || git commit -m "Update GitHub Pages dashboard data [skip ci]"
          git push
